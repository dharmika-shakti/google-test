<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Google Puppeteer Test - Hostinger</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    
    .container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 40px;
      max-width: 500px;
      width: 100%;
    }
    
    h1 {
      color: #333;
      margin-bottom: 10px;
      font-size: 28px;
    }
    
    .subtitle {
      color: #666;
      margin-bottom: 30px;
      font-size: 14px;
    }
    
    .status-box {
      background: #f5f5f5;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      border-left: 4px solid #667eea;
    }
    
    .status-label {
      font-size: 12px;
      color: #999;
      text-transform: uppercase;
      margin-bottom: 5px;
      font-weight: 600;
    }
    
    .status-value {
      font-size: 16px;
      color: #333;
      font-weight: 500;
    }
    
    .status-value.running {
      color: #f59e0b;
    }
    
    .status-value.idle {
      color: #10b981;
    }
    
    button {
      width: 100%;
      padding: 12px 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      margin-bottom: 10px;
    }
    
    button:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
    }
    
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    
    .health-btn {
      background: #6b7280;
      margin-bottom: 10px;
    }
    
    .health-btn:hover:not(:disabled) {
      box-shadow: 0 10px 20px rgba(107, 114, 128, 0.4);
    }
    
    .output {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 15px;
      margin-top: 20px;
      max-height: 250px;
      overflow-y: auto;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      color: #374151;
      line-height: 1.5;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    
    .output.empty {
      color: #9ca3af;
      text-align: center;
      padding: 30px 15px;
    }

    .alert {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 15px;
      font-size: 14px;
    }

    .alert.success {
      background: #d1fae5;
      color: #065f46;
      border: 1px solid #6ee7b7;
    }

    .alert.error {
      background: #fee2e2;
      color: #7f1d1d;
      border: 1px solid #fca5a5;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🌐 Google Test</h1>
    <p class="subtitle">Run Puppeteer browser test on Hostinger</p>
    
    <div class="status-box">
      <div class="status-label">Server Status</div>
      <div class="status-value idle" id="serverStatus">Checking...</div>
    </div>
    
    <button id="runBtn" onclick="runTest()">▶ Run Google Test</button>
    <button class="health-btn" id="healthBtn" onclick="checkHealth()">Check Health</button>
    
    <div id="alertContainer"></div>
    <div class="output empty" id="output">Click "Run Google Test" to start</div>
  </div>

  <script>
    const outputEl = document.getElementById('output');
    const statusEl = document.getElementById('serverStatus');
    const runBtn = document.getElementById('runBtn');
    const alertContainer = document.getElementById('alertContainer');

    function showAlert(message, type = 'success') {
      const alert = document.createElement('div');
      alert.className = `alert ${type}`;
      alert.textContent = message;
      alertContainer.innerHTML = '';
      alertContainer.appendChild(alert);
      setTimeout(() => alert.remove(), 5000);
    }

    async function checkHealth() {
      try {
        const res = await fetch('api.php?action=health');
        const data = await res.json();
        statusEl.textContent = '✓ Server Online';
        statusEl.className = 'status-value idle';
        showAlert('Server is online!', 'success');
      } catch (error) {
        statusEl.textContent = '✗ Server Error';
        statusEl.className = 'status-value';
        statusEl.style.color = '#ef4444';
        showAlert('Error: ' + error.message, 'error');
      }
    }

    async function runTest() {
      runBtn.disabled = true;
      alertContainer.innerHTML = '';
      outputEl.textContent = '⏳ Running test...';
      outputEl.className = 'output';

      try {
        const res = await fetch('api.php?action=run');
        const data = await res.json();
        
        if (res.ok) {
          outputEl.textContent = data.output || 'Test completed!';
          outputEl.className = 'output';
          showAlert('✓ Test completed successfully!', 'success');
        } else {
          outputEl.textContent = '✗ Error: ' + (data.message || 'Unknown error');
          outputEl.className = 'output';
          showAlert('Error: ' + data.message, 'error');
        }
      } catch (error) {
        outputEl.textContent = '✗ Error: ' + error.message;
        outputEl.className = 'output';
        showAlert('Error: ' + error.message, 'error');
      } finally {
        runBtn.disabled = false;
      }
    }

    // Check health on load
    checkHealth();
  </script>
</body>
</html>
